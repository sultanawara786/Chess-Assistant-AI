name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libc6-dev jhead libjpeg-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip setuptools virtualenv
        pip install cython==0.29.36
        pip install git+https://github.com/kivy/buildozer.git@master

    - name: Build APK with Buildozer
      run: |
        yes | buildozer android debug
      continue-on-error: false

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Chess-Assistant-APK
        path: bin/*.apk
