name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libgdbm-dev libgdbm-compat-dev libsqlite3-dev libbz2-dev libreadline-dev textinfo libffi-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools virtualenv
          pip install cython==0.29.36
          pip install git+https://github.com/kivy/buildozer.git

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chess-Assistant-APK
          path: bin/*.apk
